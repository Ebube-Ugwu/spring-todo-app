<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Spring Todo</title>
   <link rel="stylesheet" type="text/css" th:href="@{/css/bulma.css}">
</head>
<body>
<div class="container">

<div class="card" th:each="todo : ${todos}">
<div class="card-header"><span th:text="${todo.name}"></span></div>
    <div class="card-content"><span
            th:text="${todo.description()}"></span></div>
</div>
</div>
</body>
</html>
